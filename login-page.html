<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BZOT-Login/Signup</title>
    <link rel="stylesheet" href="../dist/output.css" />
  </head>
  <body>
    <div id="root">
      <main
        class="relative flex h-screen w-screen items-center justify-center overflow-hidden bg-radial from-[#0085FF] to-[#003465]"
      >
        <!-- main-container -->
        <div
          id="from-container"
          class="relative z-10 flex h-152 w-md flex-col items-center justify-between rounded-2xl border-2 border-[#3874BC]/49 bg-[#5882C1]/1 px-20 py-8 shadow-2xl backdrop-blur-sm"
        >
          <!-- logo -->
          <div
            id="logo"
            class="flex w-full items-center justify-center text-2xl font-bold text-white"
          >
            <a
              href=""
              class="relative flex flex-col items-center justify-center"
            >
              <img
                class="h-20 w-20"
                src="../assets/logos/bzot-logo-white.png"
                alt="BZOT Logo"
                srcset=""
              />
              <p class="absolute bottom-0 self-center">BZOT</p></a
            >
          </div>
          <!-- form-start -->
          <form class="flex w-full flex-col gap-6 text-white" action="">
            <span class="text-2xl font-bold">Login</span>
            <div id="credentials" class="flex flex-col gap-2">
              <!-- email -->
              <label for="name">Email</label>
              <input
                type="email"
                name=""
                placeholder="username@gmail.com"
                id="user-email"
                class="rounded-sm border border-[#BCBEC0] bg-white px-4 pb-1 text-sm font-medium text-black placeholder-[#BCBEC0] placeholder:text-sm placeholder:font-medium focus:outline-2 focus:outline-[#003465]"
              />
              <!-- password -->
              <label for="password">Password</label>
              <input
                type="password"
                name=""
                placeholder="password"
                id="user-password"
                class="input-on-error rounded-sm border border-[#BCBEC0] bg-white px-4 pb-1 text-sm font-medium text-black placeholder-[#BCBEC0] placeholder:text-sm placeholder:font-medium focus:outline-2 focus:outline-[#003465]"
              />
              <!-- view/hide-password -->
              <button
                type="button"
                class="password-toggle absolute top-71 right-21 mt-px flex h-5 w-5 cursor-pointer items-center justify-center rounded-md border-none bg-white text-[#9499b7] shadow-xl shadow-black transition-all duration-300 ease-out"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <svg
                  class="eye-open h-3 w-3"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg
                  class="eye-closed hidden h-3 w-3"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
              <!-- forgot-password -->
              <div class="flex h-6 w-full items-center justify-between gap-2">
                <a class="text-xs font-bold text-nowrap" href=""
                  >Forgot Password?</a
                >
                <!-- Error Message -->
                <span
                  class="error-message input-on-error rounded-md bg-white/64 px-2 pb-px text-xs font-bold text-nowrap text-[#ff3b5c]"
                  id="passwordError"
                  >Wrong credentials</span
                >
              </div>
            </div>
            <!-- login-btn -->
            <button
              id="sign-btn"
              class="flex h-10 w-full cursor-pointer items-center justify-center rounded-md bg-[#003465] pb-px text-xl font-semibold text-white"
            >
              Sign In
            </button>
            <p class="self-center">or to continue with</p>
            <!-- other-sign-option -->
            <div class="flex items-center justify-around">
              <!-- google -->
              <button
                id="google-sign-btn"
                class="flex h-12 w-16 cursor-pointer items-center justify-center rounded-xl bg-white"
              >

	C107.596,253.888,107.428,251.624,107.428,249.32z"

                  <g>
                    <path
                      style="fill: #f7b92b"

                    />
                  </g>
                  <path

	c35.696-9.904,68.592-27.832,95.832-53.128L337.876,374.848z"
                  />

	c22.88,0,45.368-3.056,66.84-9.008c35.696-9.904,68.592-27.832,95.832-53.128l-79.76-61.656c-22.504,14.176-50.848,21.8-82.92,21.8
	c-18.768,0-36.648-3.568-53.128-9.912c-12.136-4.672-23.464-10.92-33.808-18.44"
                  />
                  <path
                    style="fill: #0faef4"
                    d="M487.612,201.32h-14.968h-215.36v41.168v13.68v41.152h131.592c-6.696,32-24.92,61.088-51,77.528
	l79.76,61.656c21.872-20.304,40.04-45.784,53.112-75.256c14.336-32.288,22.536-70.96,22.536-113.456
	C493.284,233.072,491.02,217.32,487.612,201.32z"
                  />
                  <g>
                    <path
                      style="fill: #4087ed"
                      d="M417.636,436.504c21.872-20.304,40.2-46.072,53.272-75.544
		c14.336-32.288,22.456-70.816,22.456-113.304c0-14.728-2.344-30.336-5.752-46.336h-14.328"
                    />
                    <polyline
                      style="fill: #4087ed"
                      points="257.284,241.32 257.284,256.168 257.284,297.32 385.284,297.32 	"
                    />
                  </g>
                </svg>
              </button>
              <!-- github -->
              <button
                id="github-sign-btn"
                class="flex h-12 w-16 cursor-pointer items-center justify-center rounded-xl bg-white"
              >
                <svg
                  class="h-6 w-6"
                  viewBox="0 0 16 16"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M7.976 0A7.977 7.977 0 000 7.976c0 3.522 2.3 6.507 5.431 7.584.392.049.538-.196.538-.392v-1.37c-2.201.49-2.69-1.076-2.69-1.076-.343-.93-.881-1.175-.881-1.175-.734-.489.048-.489.048-.489.783.049 1.224.832 1.224.832.734 1.223 1.859.88 2.3.685.048-.538.293-.88.489-1.076-1.762-.196-3.621-.881-3.621-3.964 0-.88.293-1.566.832-2.153-.05-.147-.343-.978.098-2.055 0 0 .685-.196 2.201.832.636-.196 1.322-.245 2.007-.245s1.37.098 2.006.245c1.517-1.027 2.202-.832 2.202-.832.44 1.077.146 1.908.097 2.104a3.16 3.16 0 01.832 2.153c0 3.083-1.86 3.719-3.62 3.915.293.244.538.733.538 1.467v2.202c0 .196.146.44.538.392A7.984 7.984 0 0016 7.976C15.951 3.572 12.38 0 7.976 0z"
                    fill="#000000"
                  />
                </svg>
              </button>
              <!-- facebook -->
              <button
                id="facebook-sign-btn"
                class="flex h-12 w-16 cursor-pointer items-center justify-center rounded-xl bg-white"
              >
                <svg
                  class="h-6 w-6"
                  viewBox="0 0 16 16"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                >
                  <path
                    fill="#1877F2"
                    d="M15 8a7 7 0 00-7-7 7 7 0 00-1.094 13.915v-4.892H5.13V8h1.777V6.458c0-1.754 1.045-2.724 2.644-2.724.766 0 1.567.137 1.567.137v1.723h-.883c-.87 0-1.14.54-1.14 1.093V8h1.941l-.31 2.023H9.094v4.892A7.001 7.001 0 0015 8z"
                  />
                  <path
                    fill="#ffffff"
                    d="M10.725 10.023L11.035 8H9.094V6.687c0-.553.27-1.093 1.14-1.093h.883V3.87s-.801-.137-1.567-.137c-1.6 0-2.644.97-2.644 2.724V8H5.13v2.023h1.777v4.892a7.037 7.037 0 002.188 0v-4.892h1.63z"
                  />
                </svg>
              </button>
            </div>
            <div class="self-center">
              <span class="text-sm font-light">Don't have an account?</span>
              <a href="" class="text-sm font-bold">Register</a>
            </div>
          </form>
          <!-- form-end -->
        </div>
        <!-- graphics -->
        <div class="absolute">
          <div class="absolute top-12 left-35 h-64 w-64">
            <img src="./assets/elements/bg-items-v5.png" alt="v1" srcset="" />
          </div>
          <div class="absolute left-25 h-64 w-64">
            <img src="./assets/elements/bg-items-v5.png" alt="v1" srcset="" />
          </div>
          <div class="absolute bottom-1 left-10 h-80 w-80">
            <img src="./assets/elements/bg-items-v2.png" alt="v2" srcset="" />
          </div>
          <div class="absolute top-32 right-32 h-56 w-56">
            <img src="./assets/elements/bg-items-v4.png" alt="v2" srcset="" />
          </div>
          <div class="absolute right-32 bottom-32 h-48 w-48">
            <img src="./assets/elements/shoes-blue-v1.svg" alt="v2" srcset="" />
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
