    <div id="root">

        <!-- header -->
        <header class="bg-[#252525]">
          <div
            id="logo"
            class="flex h-full w-full items-center justify-center text-2xl font-bold text-white"
          >
            <a
              href="./index.html"
              class="relative flex flex-col items-center justify-center"
            >
              <img
                class="h-20 w-20"
                src="../assets/logos/bzot-logo-white.png"
                alt="BZOT Logo"
                srcset=""
              />
              <p class="absolute bottom-0 self-center text-[#3871c1]">
                BZOT
              </p></a
            >
          </div>
        </header>
        <!-- nav-bar section -->
        <nav
          class="flex h-full w-full items-center justify-between bg-linear-to-l from-[#3871c1] to-[#00adef] px-8"
        >
          <!-- welcome-section -->
          <div class="">
            <p class="text-2xl font-bold text-white">
              Welcome to BZOT, User Name
            </p>
            <p class="text-base text-white">
              Introducing new Football Shoes, Check them out, 49% off
            </p>
          </div>
          <!-- search-section -->
          <div class="">
            <search class="flex items-center justify-center gap-2">
              <input
                id="search"
                type="text"
                class="h-9 rounded-full bg-white px-4 pb-px placeholder:text-gray-400"
                placeholder="Search"
              />
              <button
                class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-white bg-white bg-linear-to-l from-[#3871c1] to-[#00adef] fill-white"

                  />
