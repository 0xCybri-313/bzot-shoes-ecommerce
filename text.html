<!-- index.html (Your main template file) -->
<nav>
  <a href="home.html" onclick="loadContent(event, 'home.html')">Home</a>
  <a href="about.html" onclick="loadContent(event, 'about.html')">About</a>
  <a href="contact.html" onclick="loadContent(event, 'contact.html')"
    >Contact</a
  >
</nav>

<main id="content-area">
  <!-- Content will be loaded here -->
</main>

<footer>
  <p>© 2025 My Website</p>
</footer>

<script>
  async function loadContent(event, url) {
    event.preventDefault(); // Prevent the browser from navigating away
    try {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      const htmlText = await response.text();
      document.getElementById("content-area").innerHTML = htmlText;

      // Optional: Update the browser URL history so the user can use the back button
      history.pushState({}, "", url);
    } catch (error) {
      console.error("Could not load page content:", error);
      document.getElementById("content-area").innerHTML =
        "<p>Error loading content.</p>";
    }
  }
</script>
